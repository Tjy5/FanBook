services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: fanbook
      MYSQL_USER: fanbook
      MYSQL_PASSWORD: fanbook
      MYSQL_ROOT_PASSWORD: fanbook-root
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    ports:
      - "3306:3306"
    volumes:
      - fanbook-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pfanbook-root --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: fanbook
      RABBITMQ_DEFAULT_PASS: fanbook
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      FANBOOK_DATASOURCE_URL: jdbc:mysql://mysql:3306/fanbook?serverTimezone=UTC
      FANBOOK_DATASOURCE_USERNAME: fanbook
      FANBOOK_DATASOURCE_PASSWORD: fanbook
      FANBOOK_REDIS_HOST: redis
      FANBOOK_RABBITMQ_HOST: rabbitmq
      FANBOOK_RABBITMQ_USERNAME: fanbook
      FANBOOK_RABBITMQ_PASSWORD: fanbook
      FANBOOK_STORAGE_ROOT: /app/runtime/storage
    ports:
      - "8080:8080"
    volumes:
      - fanbook-storage:/app/runtime/storage

volumes:
  fanbook-mysql:
  fanbook-storage:
