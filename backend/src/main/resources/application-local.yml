spring:
  datasource:
    url: ${FANBOOK_LOCAL_DATASOURCE_URL:jdbc:h2:file:./runtime/local/fanbook;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${FANBOOK_LOCAL_DATASOURCE_USERNAME:sa}
    password: ${FANBOOK_LOCAL_DATASOURCE_PASSWORD:}
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

management:
  health:
    redis:
      enabled: false

fanbook:
  storage:
    root: ${FANBOOK_LOCAL_STORAGE_ROOT:./runtime/local/storage}
  ai:
    provider: mock
    model: mock-translator
