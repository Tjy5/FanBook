spring:
  application:
    name: fanbook-java-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${FANBOOK_DATASOURCE_URL:jdbc:mysql://localhost:3306/fanbook?serverTimezone=UTC}
    username: ${FANBOOK_DATASOURCE_USERNAME:fanbook}
    password: ${FANBOOK_DATASOURCE_PASSWORD:fanbook}
  data:
    redis:
      host: ${FANBOOK_REDIS_HOST:localhost}
      port: ${FANBOOK_REDIS_PORT:6379}
  rabbitmq:
    host: ${FANBOOK_RABBITMQ_HOST:localhost}
    port: ${FANBOOK_RABBITMQ_PORT:5672}
    username: ${FANBOOK_RABBITMQ_USERNAME:fanbook}
    password: ${FANBOOK_RABBITMQ_PASSWORD:fanbook}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        timezone:
          default_storage: NORMALIZE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

fanbook:
  storage:
    root: ${FANBOOK_STORAGE_ROOT:./runtime/storage}
  translation:
    executor:
      core-pool-size: 2
      max-pool-size: 4
    messaging:
      exchange: fanbook.jobs
      chunk-queue: translation.chunk.queue
      retry-queue: translation.chunk.retry
      dead-letter-queue: translation.chunk.dlq
      routing-key: translation.chunk
      prefetch: 2
      concurrency: 4
    recovery:
      chunk-lease: 10m
      scan-delay: 60s
      stale-job-threshold: 30m
    chunk-target-characters: 6000
    max-segments-per-chunk: 40
    max-attempts-per-chunk: 3
  ai:
    provider: ${FANBOOK_AI_PROVIDER:mock}
    base-url: ${FANBOOK_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${FANBOOK_AI_API_KEY:}
    model: ${FANBOOK_AI_MODEL:mock-translator}
    request-timeout: 90s
    max-concurrency: 2
